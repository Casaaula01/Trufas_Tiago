<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trufas do Tiago</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍫 Trufas Tiago</h1>
    <p>Qualidade, sabor e tradição nas melhores trufas artesanais da região</p>
</header>

<section class="sabores">
    <h2>Nossos Sabores</h2>

    <div class="card">
        <div class="img-container">
            <img src="img/chocolate.jpg" alt="Trufa Chocolate">
        </div>
        <h3>Chocolate</h3>
        <a href="https://wa.me/5548984969711?text= Olá! Você pode me informar quanto custa a trufa de chocolate?"
           target="_blank"
           class="btn-sabor">
           Pedir Chocolate
        </a>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="img/morango.jpg" alt="Trufa Morango">
        </div>
        <h3>Morango</h3>
        <a href="https://wa.me/5548984969711?text=Olá! Você pode me informar quanto custa a trufa de Morango?"
           target="_blank"
           class="btn-sabor">
           Pedir Morango
        </a>
    </div>

    <div class="card">
        <div class="img-container">
            <img src="img/maracuja.jpg.jpg" alt="Trufa Maracujá">
        </div>
        <h3>Maracujá</h3>
        <a href="https://wa.me/554884969711?text=Olá! Você pode me informar quanto custa a trufa de Maracuja?"
           target="_blank"
           class="btn-sabor">
           Pedir Maracujá
        </a>
    </div>

</section>

</body>
</html>
